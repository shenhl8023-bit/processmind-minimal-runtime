name: processmind

services:
  api:
    image: ${PROCESSMIND_API_IMAGE:-registry.cn-hangzhou.aliyuncs.com/public-topeak/processmind-api:20260327}
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        INCLUDE_ROLLER_PROFILE_ASSETS: ${INCLUDE_ROLLER_PROFILE_ASSETS:-0}
    container_name: processmind-api
    restart: unless-stopped
    environment:
      PROCESSMIND_DATA_DIR: /runtime-data
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    volumes:
      - ./data:/runtime-data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  web:
    image: ${PROCESSMIND_WEB_IMAGE:-registry.cn-hangzhou.aliyuncs.com/public-topeak/processmind-web:20260327}
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: processmind-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${PROCESSMIND_WEB_PORT:-8080}:80"
